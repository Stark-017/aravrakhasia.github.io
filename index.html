<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arav Rakhasia | AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* HERO SECTION */

.hero{

height:100vh;
background-image:url("jarvis.gif");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

position:relative;

}

/* overlay */

.hero::after{

content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);

}

/* content container */

.hero-content{

position:relative;
z-index:2;

}

/* FIRST TEXT */

.jarvis-text{

font-family:'Orbitron',sans-serif;

font-size:60px;

color:white;

letter-spacing:4px;

opacity:0;

animation:showText 2s forwards;

animation-delay:2.5s;

text-shadow:

0 0 5px rgba(255,255,255,0.8),
0 0 15px rgba(255,255,255,0.6);

}

/* NAME TEXT */

.name-text{

font-family:'Orbitron',sans-serif;

font-size:95px;

font-weight:bold;

color:#d4af37;

-webkit-text-stroke:2px black;

letter-spacing:6px;

margin-top:20px;

opacity:0;

animation:showText 2s forwards;

animation-delay:5s;

text-shadow:

0 0 10px rgba(212,175,55,0.9),
0 0 20px rgba(212,175,55,0.7);

}

/* animation */

@keyframes showText{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}

/* scroll indicator */

.scroll{

position:absolute;
bottom:40px;
font-size:18px;
opacity:0.8;
z-index:2;

}

/* PERSONAL SECTION */

.personal{

min-height:100vh;

background:#020617;

display:flex;

justify-content:center;

align-items:center;

padding:80px;

}

.personal-container{

display:flex;

align-items:center;

justify-content:space-between;

gap:60px;

max-width:1100px;

width:100%;

}

.personal-info{

flex:1;

}

.personal-info h2{

font-size:45px;

margin-bottom:30px;

color:#38bdf8;

}

.personal-info p{

font-size:22px;

line-height:2;

}

/* IMAGE */

.personal-image{

flex:1;

text-align:center;

}

.personal-image img{

width:330px;

border-radius:20px;

box-shadow:0 0 40px rgba(0,200,255,0.5);

}

/* LINKEDIN BUTTON */

.linkedin{

display:inline-block;

margin-top:30px;

background:#0ea5e9;

padding:12px 25px;

border-radius:30px;

text-decoration:none;

color:white;

font-weight:600;

transition:0.3s;

}

.linkedin:hover{

background:#0284c7;

transform:scale(1.05);

}

</style>

</head>

<body>

<!-- HERO PAGE -->

<section class="hero">

<div class="hero-content">

<h1 class="jarvis-text">
Hello Jarvis, Time to study about
</h1>

<h2 class="name-text">
Arav Rakhasia
</h2>

</div>

<div class="scroll">
Scroll ↓
</div>

</section>


<!-- PERSONAL PAGE -->

<section class="personal">

<div class="personal-container">

<div class="personal-info">

<h2>Personal Information</h2>

<p>

<strong>Name:</strong> Arav Rakhasia<br>

<strong>Age:</strong> 20<br>

<strong>Email:</strong> arav.rakhasia2005@gmail.com<br>

<strong>Degree:</strong> MBA Tech – Artificial Intelligence<br>

<strong>Location:</strong> MUMBAI

</p>

<a class="linkedin"
href="https://www.linkedin.com/in/arav-rakhasia-70186232a/"
target="_blank">

Connect on LinkedIn

</a>

</div>

<div class="personal-image">

<img src="ARImage.jpeg">

</div>

</div>

</section>

</body>

</html>

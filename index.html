<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arav Rakhasia | AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
}

/* HERO SECTION */

.hero{

height:100vh;
background:url("jarvis.gif") center center no-repeat;
background-size:cover;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;

}

/* overlay */

.hero::after{

content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);

}

/* hero content */

.hero-content{

position:relative;
z-index:2;

}

/* top white heading */

.jarvis-title{

font-family:'Orbitron',sans-serif;

font-size:60px;

letter-spacing:4px;

color:white;

text-shadow:
0 0 5px rgba(255,255,255,0.9),
0 0 12px rgba(255,255,255,0.6);

margin-bottom:15px;

}

/* glowing name */

.jarvis-name{

font-family:'Orbitron',sans-serif;

font-size:90px;

font-weight:700;

letter-spacing:6px;

color:#00c8ff;

text-shadow:
0 0 5px #00c8ff,
0 0 15px #00c8ff,
0 0 30px #00c8ff,
0 0 50px rgba(0,200,255,0.9);

}

/* scroll indicator */

.scroll{

position:absolute;

bottom:40px;

font-size:18px;

opacity:0.8;

z-index:2;

}

/* PERSONAL SECTION */

.personal{

min-height:100vh;

background:#020617;

display:flex;

justify-content:center;

align-items:center;

padding:80px;

}

/* container */

.personal-container{

display:flex;

align-items:center;

justify-content:space-between;

gap:60px;

max-width:1100px;

width:100%;

}

/* info */

.personal-info{

flex:1;

}

.personal-info h2{

font-size:45px;

margin-bottom:30px;

color:#38bdf8;

}

.personal-info p{

font-size:22px;

line-height:2;

}

/* image */

.personal-image{

flex:1;

text-align:center;

}

.personal-image img{

width:330px;

border-radius:20px;

box-shadow:0 0 40px rgba(0,200,255,0.5);

}

/* linkedin button */

.linkedin{

display:inline-block;

margin-top:30px;

background:#0ea5e9;

padding:12px 25px;

border-radius:30px;

text-decoration:none;

color:white;

font-weight:600;

transition:0.3s;

}

.linkedin:hover{

background:#0284c7;

transform:scale(1.05);

}

</style>

</head>

<body>

<!-- HERO PAGE -->

<section class="hero">

<div class="hero-content">

<h1 class="jarvis-title">
HELLO JARVIS, LET'S STUDY ABOUT
</h1>

<h2 class="jarvis-name">
ARAV RAKHASIA
</h2>

</div>

<div class="scroll">
Scroll ↓
</div>

</section>

<!-- PERSONAL PAGE -->

<section class="personal">

<div class="personal-container">

<div class="personal-info">

<h2>Personal Information</h2>

<p>

<strong>Name:</strong> Arav Rakhasia<br>

<strong>Age:</strong> 20<br>

<strong>Email:</strong> arav.rakhasia2005@gmail.com<br>

<strong>Degree:</strong> MBA Tech – Artificial Intelligence<br>

<strong>Location:</strong> MUMBAI

</p>

<a class="linkedin"
href="https://www.linkedin.com/in/arav-rakhasia-70186232a/"
target="_blank">

Connect on LinkedIn

</a>

</div>

<div class="personal-image">

<img src="ARImage.jpeg">

</div>

</div>

</section>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arav Rakhasia | AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* LINKEDIN BUTTON */

.linkedin{
position:fixed;
top:25px;
right:30px;
background:#0ea5e9;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:600;
z-index:10;
transition:0.3s;
}

.linkedin:hover{
background:#0284c7;
transform:scale(1.05);
}

/* HERO SECTION */

.hero{
height:100vh;
background-image:url("jarvis.gif");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

/* Dark overlay */

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

/* Hero content */

.hero-content{
position:relative;
z-index:2;
}

/* Text animation */

.jarvis-text{
opacity:0;
animation:fadeIn 3s ease forwards;
animation-delay:3s;
}

@keyframes fadeIn{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* Heading */

.hero h1{
font-family:'Orbitron',sans-serif;
font-size:48px;
letter-spacing:3px;
margin-bottom:15px;
}

.hero h2{
font-family:'Orbitron',sans-serif;
font-size:75px;
color:#00e5ff;
font-weight:800;
text-shadow:0 0 25px #00e5ff;
letter-spacing:5px;
}

/* Scroll indicator */

.scroll-indicator{
position:absolute;
bottom:40px;
font-size:18px;
opacity:0.8;
animation:bounce 2s infinite;
z-index:2;
}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

/* PERSONAL SECTION */

.personal{
min-height:100vh;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
padding:80px 20px;
}

.personal-card{

background:#0f172a;
padding:60px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,229,255,0.2);
max-width:800px;
width:100%;
text-align:left;

}

/* Personal heading */

.personal h2{
font-size:45px;
margin-bottom:30px;
color:#38bdf8;
}

/* Personal info */

.info{

font-size:22px;
line-height:2;

}

.info strong{
color:#38bdf8;
}

</style>

</head>

<body>

<!-- LINKEDIN BUTTON -->

<a class="linkedin"
href="https://www.linkedin.com/in/arav-rakhasia-70186232a/"
target="_blank">

Connect on LinkedIn

</a>

<!-- HERO SECTION -->

<section class="hero">

<div class="hero-content jarvis-text">

<h1>HELLO JARVIS, LET'S STUDY ABOUT</h1>

<h2>ARAV RAKHASIA</h2>

</div>

<div class="scroll-indicator">

Scroll ↓

</div>

</section>


<!-- PERSONAL SECTION -->

<section class="personal">

<div class="personal-card">

<h2>Personal Information</h2>

<div class="info">

<strong>Name:</strong> Arav Rakhasia<br>

<strong>Age:</strong> 20<br>

<strong>Email:</strong> arav.rakhasia2005@gmail.com<br>

<strong>Degree:</strong> MBA Tech – Artificial Intelligence<br>

<strong>Location:</strong> Mumbai, India

</div>

</div>

</section>

</body>

</html>
